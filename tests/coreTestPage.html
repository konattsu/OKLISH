<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OKLISH Core Test Page</title>
  <style>
    body {
      background: #f7f7f7;
      color: #222;
      margin: 0;
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .container {
      max-width: 900px;
      margin: 32px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px 24px;
    }
    h1, h2, h3 { color: #1a237e; }
    button, input, select, textarea {
      font-size: 1rem;
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #bdbdbd;
    }
    button {
      background: #1976d2;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1565c0; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
    }
    th, td {
      border: 1px solid #bdbdbd;
      padding: 8px 12px;
      text-align: left;
    }
    th { background: #e3f2fd; }
    a { color: #1976d2; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .flex-row { display: flex; gap: 16px; align-items: center; }
    .card {
      background: #e3f2fd;
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
      box-shadow: 0 1px 4px rgba(25, 118, 210, 0.08);
    }
    img.demo-img {
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #bdbdbd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OKLISH Core Test Page</h1>
    <div class="flex-row">
      <button onclick="alert('Button clicked!')">Test Button</button>
      <input type="text" placeholder="Type here..." />
      <select>
        <option>Option 1</option>
        <option>Option 2</option>
        <option>Option 3</option>
      </select>
    </div>
    <div class="card">
      <h2>Form Example</h2>
      <form onsubmit="event.preventDefault(); alert('Form submitted!')">
        <label>Name: <input type="text" name="name" required /></label><br />
        <label>Email: <input type="email" name="email" required /></label><br />
        <label>Message:<br />
          <textarea name="message" rows="3" cols="30"></textarea>
        </label><br />
        <button type="submit">Submit</button>
      </form>
    </div>
    <div class="card">
      <h2>List Example</h2>
      <ul>
        <li>List item 1</li>
        <li>List item 2</li>
        <li>List item 3</li>
      </ul>
    </div>
    <div class="card">
      <h2>Table Example</h2>
      <table>
        <thead>
          <tr><th>ID</th><th>Name</th><th>Status</th></tr>
        </thead>
        <tbody>
          <tr><td>1</td><td>Alice</td><td>Active</td></tr>
          <tr><td>2</td><td>Bob</td><td>Inactive</td></tr>
          <tr><td>3</td><td>Carol</td><td>Pending</td></tr>
        </tbody>
      </table>
    </div>
    <div class="card">
      <h2>Image & Link Example</h2>
      <img class="demo-img" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80" alt="Demo" />
      <p>Visit <a href="https://github.com/" target="_blank">GitHub</a></p>
    </div>
    <div class="card">
      <h2>Checkboxes & Radios</h2>
      <label><input type="checkbox" /> Checkbox 1</label>
      <label><input type="checkbox" /> Checkbox 2</label>
      <label><input type="radio" name="radioGroup" /> Radio 1</label>
      <label><input type="radio" name="radioGroup" /> Radio 2</label>
    </div>
    <div id="oklish-root"></div>
  </div>
  <script type="module" defer>
    // Wait for window.OKLISH to be defined before calling init
    function waitForOKLISHInit() {
      if (window.OKLISH && typeof window.OKLISH.init === 'function') {
        window.OKLISH.init();
      } else {
        setTimeout(waitForOKLISHInit, 50);
      }
    }
    waitForOKLISHInit();
  </script>
</body>
</html>
